<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HLC Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a0a00; min-height:100vh; font-family:'Inter',sans-serif; color:#FFD700; }

/* LOGIN */
#loginScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
.login-box { background:rgba(0,0,0,0.7); border:2px solid #FFD700; border-radius:10px; padding:40px 36px; width:340px; text-align:center; }
.login-box h1 { font-family:'Bebas Neue',cursive; font-size:2rem; color:#FFD700; margin-bottom:6px; letter-spacing:0.1em; }
.login-box p { font-size:0.75rem; color:rgba(255,215,0,0.4); margin-bottom:24px; }
.login-input { width:100%; background:#2a1500; border:2px solid #7a5500; color:#FFD700; font-family:'Inter',sans-serif; font-size:1rem; padding:10px 14px; border-radius:6px; outline:none; margin-bottom:14px; }
.login-input:focus { border-color:#FFD700; }
.login-btn { width:100%; background:#FFD700; color:#1a0a00; font-family:'Bebas Neue',cursive; font-size:1.2rem; padding:10px; border:none; border-radius:6px; cursor:pointer; letter-spacing:0.1em; transition:all 0.15s; }
.login-btn:hover { background:#fff0a0; }
.login-err { color:#ff4444; font-size:0.75rem; margin-top:8px; min-height:16px; }

/* MAIN */
#adminScreen { display:none; padding:20px; max-width:1100px; margin:0 auto; }
.admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding-bottom:16px; border-bottom:2px solid #7a5500; }
.admin-header h1 { font-family:'Bebas Neue',cursive; font-size:2rem; letter-spacing:0.1em; }
.admin-header span { font-size:0.75rem; color:rgba(255,215,0,0.4); }
.logout-btn { background:transparent; border:2px solid #7a5500; color:#7a5500; font-family:'Bebas Neue',cursive; font-size:0.9rem; padding:5px 14px; border-radius:4px; cursor:pointer; letter-spacing:0.05em; transition:all 0.15s; }
.logout-btn:hover { border-color:#ff4444; color:#ff4444; }

/* STATUS BAR */
.status-bar { background:rgba(0,0,0,0.4); border:1px solid #3a2000; border-radius:6px; padding:8px 14px; margin-bottom:20px; font-size:0.72rem; color:rgba(255,215,0,0.5); display:flex; gap:16px; align-items:center; }
.status-dot { width:8px; height:8px; border-radius:50%; background:#ff4444; display:inline-block; margin-right:4px; }
.status-dot.ok { background:#4cff72; }

/* GRID */
.grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:700px) { .grid { grid-template-columns:1fr; } }

/* PANEL */
.panel { background:rgba(0,0,0,0.6); border:2px solid #7a5500; border-radius:8px; overflow:hidden; }
.panel-header { background:#1a0800; border-bottom:2px solid #7a5500; padding:10px 14px; display:flex; align-items:center; justify-content:space-between; }
.panel-header h2 { font-family:'Bebas Neue',cursive; font-size:1.1rem; letter-spacing:0.08em; }
.panel-body { padding:14px; }

/* NOW PLAYING */
.now-playing-bar { background:rgba(76,255,114,0.07); border:1px solid rgba(76,255,114,0.3); border-radius:6px; padding:8px 12px; margin-bottom:12px; font-size:0.75rem; display:flex; align-items:center; gap:8px; }
.np-label { color:rgba(255,215,0,0.4); font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; white-space:nowrap; }
.np-title { color:#4cff72; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* QUEUE LIST */
.queue-list { display:flex; flex-direction:column; gap:6px; max-height:280px; overflow-y:auto; margin-bottom:12px; scrollbar-width:thin; scrollbar-color:#7a5500 transparent; }
.queue-item { display:flex; align-items:center; gap:8px; background:rgba(255,215,0,0.04); border:1px solid #3a2000; border-radius:5px; padding:7px 10px; }
.queue-item.current { border-color:rgba(76,255,114,0.4); background:rgba(76,255,114,0.05); }
.qi-num { font-family:'Bebas Neue',cursive; font-size:0.85rem; color:rgba(255,215,0,0.3); width:18px; flex-shrink:0; }
.qi-info { flex:1; min-width:0; }
.qi-title { font-size:0.72rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.qi-by { font-size:0.6rem; color:rgba(255,215,0,0.35); }
.qi-del { background:transparent; border:1px solid #ff4444; color:#ff4444; font-size:0.65rem; padding:3px 7px; border-radius:3px; cursor:pointer; white-space:nowrap; transition:all 0.12s; font-family:'Bebas Neue',cursive; letter-spacing:0.05em; }
.qi-del:hover { background:#ff4444; color:white; }
.queue-empty { font-size:0.72rem; color:rgba(255,215,0,0.25); text-align:center; padding:16px; }

/* BUTTONS */
.btn-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.btn { font-family:'Bebas Neue',cursive; font-size:0.9rem; padding:7px 14px; border-radius:5px; cursor:pointer; letter-spacing:0.05em; transition:all 0.12s; border:2px solid; white-space:nowrap; }
.btn-skip { border-color:#FFD700; color:#FFD700; background:transparent; }
.btn-skip:hover { background:#FFD700; color:#1a0a00; }
.btn-clear { border-color:#ff4444; color:#ff4444; background:transparent; }
.btn-clear:hover { background:#ff4444; color:white; }
.btn-add { border-color:#4cff72; color:#4cff72; background:transparent; }
.btn-add:hover { background:#4cff72; color:#1a0a00; }
.btn:disabled { opacity:0.3; cursor:not-allowed; }

/* ADD FORM */
.add-form { display:flex; gap:6px; }
.add-input { flex:1; background:#1a0a00; border:2px solid #7a5500; color:#FFD700; font-family:'Inter',sans-serif; font-size:0.7rem; padding:7px 10px; border-radius:5px; outline:none; min-width:0; }
.add-input::placeholder { color:rgba(255,215,0,0.2); }
.add-input:focus { border-color:#FFD700; }
.add-msg { font-size:0.65rem; color:#ff4444; margin-top:5px; min-height:14px; }
.add-msg.ok { color:#4cff72; }

/* REFRESH */
.refresh-info { font-size:0.6rem; color:rgba(255,215,0,0.25); text-align:right; margin-top:6px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>👑 HLC ADMIN</h1>
    <p>holeechit.xyz — queue management</p>
    <input class="login-input" id="passInput" type="password" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ENTER</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminScreen">
  <div class="admin-header">
    <div>
      <h1>👑 HLC ADMIN</h1>
      <span id="serverUrl"></span>
    </div>
    <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
  </div>

  <div class="status-bar">
    <div><span class="status-dot" id="statusDot"></span><span id="statusText">connecting...</span></div>
    <div>YT queue: <b id="ytCount">0</b></div>
    <div>NetEase queue: <b id="neteCount">0</b></div>
    <div style="margin-left:auto;cursor:pointer;color:rgba(255,215,0,0.4)" onclick="loadQueues()">↻ refresh</div>
  </div>

  <div class="grid">

    <!-- YOUTUBE PANEL -->
    <div class="panel">
      <div class="panel-header">
        <h2>▶ YOUTUBE QUEUE</h2>
      </div>
      <div class="panel-body">
        <div class="now-playing-bar">
          <span class="np-label">NOW</span>
          <span class="np-title" id="ytNowPlaying">—</span>
        </div>
        <div class="btn-row">
          <button class="btn btn-skip" onclick="skipYT()">⏭ SKIP CURRENT</button>
          <button class="btn btn-clear" onclick="clearYT()">🗑 CLEAR ALL</button>
        </div>
        <div class="queue-list" id="ytQueueList"></div>
        <div class="add-form">
          <input class="add-input" id="ytAddInput" type="text" placeholder="youtube.com/watch?v=... or video ID">
          <button class="btn btn-add" onclick="addYT()">+ ADD</button>
        </div>
        <div class="add-msg" id="ytAddMsg"></div>
        <div class="refresh-info" id="ytRefreshInfo"></div>
      </div>
    </div>

    <!-- NETEASE PANEL -->
    <div class="panel">
      <div class="panel-header">
        <h2>🎵 NETEASE QUEUE</h2>
      </div>
      <div class="panel-body">
        <div class="now-playing-bar">
          <span class="np-label">NOW</span>
          <span class="np-title" id="neteNowPlaying">—</span>
        </div>
        <div class="btn-row">
          <button class="btn btn-skip" onclick="skipNete()">⏭ SKIP CURRENT</button>
          <button class="btn btn-clear" onclick="clearNete()">🗑 CLEAR ALL</button>
        </div>
        <div class="queue-list" id="neteQueueList"></div>
        <div class="add-form">
          <input class="add-input" id="neteAddInput" type="text" placeholder="music.163.com/song?id=... or song ID">
          <button class="btn btn-add" onclick="addNete()">+ ADD</button>
        </div>
        <div class="add-msg" id="neteAddMsg"></div>
        <div class="refresh-info" id="neteRefreshInfo"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────
// Server URL — same origin by default, or override here
const SERVER = window.location.hostname === 'holeechit.xyz'
  ? 'https://holeechit-server.onrender.com'   // ← your Render URL
  : 'http://localhost:3000';

let PASS = '';
let refreshTimer = null;

// ── Login ─────────────────────────────────────────────────
async function doLogin() {
  const p = document.getElementById('passInput').value.trim();
  if (!p) return;
  // Test the password by calling /admin/queue
  try {
    const r = await fetch(`${SERVER}/admin/queue?pass=${encodeURIComponent(p)}`);
    if (r.status === 403) {
      document.getElementById('loginErr').textContent = 'Wrong password.';
      return;
    }
    PASS = p;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    document.getElementById('serverUrl').textContent = SERVER;
    document.getElementById('statusDot').classList.add('ok');
    document.getElementById('statusText').textContent = 'connected';
    loadQueues();
    refreshTimer = setInterval(loadQueues, 5000);
  } catch(e) {
    document.getElementById('loginErr').textContent = 'Cannot reach server.';
  }
}

function doLogout() {
  PASS = '';
  clearInterval(refreshTimer);
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('passInput').value = '';
  document.getElementById('loginErr').textContent = '';
}

// ── API helpers ───────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${SERVER}${path}?pass=${encodeURIComponent(PASS)}`, opts);
  return r.json();
}

// ── Load queues ───────────────────────────────────────────
async function loadQueues() {
  try {
    const data = await api('GET', '/admin/queue');
    renderYT(data.ytQueue || [], data.ytCurrent);
    renderNete(data.neteQueue || [], data.neteCurrent);
    document.getElementById('ytCount').textContent = (data.ytQueue||[]).length;
    document.getElementById('neteCount').textContent = (data.neteQueue||[]).length;
    const now = new Date().toLocaleTimeString();
    document.getElementById('ytRefreshInfo').textContent = 'Last updated: ' + now;
    document.getElementById('neteRefreshInfo').textContent = 'Last updated: ' + now;
  } catch(e) {
    document.getElementById('statusDot').classList.remove('ok');
    document.getElementById('statusText').textContent = 'connection error';
  }
}

// ── Render YT queue ───────────────────────────────────────
function renderYT(queue, current) {
  const list = document.getElementById('ytQueueList');
  const np = document.getElementById('ytNowPlaying');
  if (!queue.length) {
    list.innerHTML = '<div class="queue-empty">Queue is empty — radio playing</div>';
    np.textContent = current ? current : '— radio —';
    return;
  }
  const cur = queue[0];
  np.textContent = cur.title || cur.videoId;
  list.innerHTML = queue.map((item, i) => `
    <div class="queue-item ${i===0?'current':''}">
      <div class="qi-num">${i===0?'▶':i+1}</div>
      <div class="qi-info">
        <div class="qi-title">${esc(item.title||item.videoId)}</div>
        <div class="qi-by">by ${esc(item.addedBy)} · <a href="https://youtu.be/${item.videoId}" target="_blank" style="color:rgba(255,215,0,0.35);font-size:0.58rem">${item.videoId}</a></div>
      </div>
      <button class="qi-del" onclick="deleteYT(${i})">✕ DEL</button>
    </div>
  `).join('');
}

// ── Render NetEase queue ──────────────────────────────────
function renderNete(queue, current) {
  const list = document.getElementById('neteQueueList');
  const np = document.getElementById('neteNowPlaying');
  if (!queue.length) {
    list.innerHTML = '<div class="queue-empty">Queue is empty — radio playing</div>';
    np.textContent = '— radio —';
    return;
  }
  np.textContent = queue[0].title || queue[0].songId;
  list.innerHTML = queue.map((item, i) => `
    <div class="queue-item ${i===0?'current':''}">
      <div class="qi-num">${i===0?'▶':i+1}</div>
      <div class="qi-info">
        <div class="qi-title">${esc(item.title||item.songId)}</div>
        <div class="qi-by">by ${esc(item.addedBy)} · ID: ${item.songId}</div>
      </div>
      <button class="qi-del" onclick="deleteNete(${i})">✕ DEL</button>
    </div>
  `).join('');
}

// ── YT actions ────────────────────────────────────────────
async function deleteYT(idx) {
  await api('DELETE', `/admin/queue/yt/${idx}`);
  loadQueues();
}
async function skipYT() {
  await api('POST', '/admin/queue/yt/skip');
  loadQueues();
}
async function clearYT() {
  if (!confirm('Clear entire YouTube queue?')) return;
  await api('DELETE', '/admin/queue/yt');
  loadQueues();
}
async function addYT() {
  const input = document.getElementById('ytAddInput');
  const msg = document.getElementById('ytAddMsg');
  const raw = input.value.trim();
  if (!raw) return;
  const videoId = extractYTId(raw);
  if (!videoId) { msg.textContent = 'Invalid YouTube link or ID'; msg.className='add-msg'; return; }
  msg.textContent = 'Checking...'; msg.className='add-msg';
  try {
    // Try to get title via oEmbed
    let title = videoId;
    try {
      const r = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
      if (r.ok) { const d = await r.json(); title = d.title || videoId; }
    } catch(e) {}
    await api('POST', '/admin/queue/yt/add', { videoId, title });
    input.value = '';
    msg.textContent = '✓ Added: ' + title; msg.className='add-msg ok';
    setTimeout(() => { msg.textContent=''; }, 3000);
    loadQueues();
  } catch(e) { msg.textContent = 'Error adding song'; msg.className='add-msg'; }
}

// ── NetEase actions ───────────────────────────────────────
async function deleteNete(idx) {
  await api('DELETE', `/admin/queue/nete/${idx}`);
  loadQueues();
}
async function skipNete() {
  await api('POST', '/admin/queue/nete/skip');
  loadQueues();
}
async function clearNete() {
  if (!confirm('Clear entire NetEase queue?')) return;
  await api('DELETE', '/admin/queue/nete');
  loadQueues();
}
async function addNete() {
  const input = document.getElementById('neteAddInput');
  const msg = document.getElementById('neteAddMsg');
  const raw = input.value.trim();
  if (!raw) return;
  const songId = extractNeteId(raw);
  if (!songId) { msg.textContent = 'Invalid NetEase link or ID'; msg.className='add-msg'; return; }
  msg.textContent = 'Adding...'; msg.className='add-msg';
  try {
    await api('POST', '/admin/queue/nete/add', { songId, title: songId });
    input.value = '';
    msg.textContent = '✓ Added!'; msg.className='add-msg ok';
    setTimeout(() => { msg.textContent=''; }, 3000);
    loadQueues();
  } catch(e) { msg.textContent = 'Error adding song'; msg.className='add-msg'; }
}

// ── Helpers ───────────────────────────────────────────────
function extractYTId(url) {
  const p = [/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/, /^([a-zA-Z0-9_-]{11})$/];
  for (const r of p) { const m = url.match(r); if (m) return m[1]; }
  return null;
}
function extractNeteId(url) {
  const m = url.match(/[?&]id=(\d+)/);
  if (m) return m[1];
  if (/^\d+$/.test(url)) return url;
  return null;
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Enter key shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.activeElement.id === 'ytAddInput') addYT();
    if (document.activeElement.id === 'neteAddInput') addNete();
  }
});
</script>
</body>
</html>
