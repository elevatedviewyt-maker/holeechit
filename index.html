<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HO LEE CHIT</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a0a00; min-height: 100vh; font-family: 'Bangers', cursive; overflow-x: hidden; user-select: none; }

/* HEADER */
.header { text-align: center; padding: 20px 20px 6px; position: relative; }
.logo-img { width: 130px; height: auto; animation: float 3s ease-in-out infinite; display: block; margin: 0 auto 4px; }
@keyframes float { 0%, 100% { transform: translateY(0px) rotate(-2deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
.title { font-size: clamp(2.6rem, 8vw, 6rem); color: #FFD700; text-shadow: 4px 4px 0 #7a5500, -2px -2px 0 #7a5500, 2px -2px 0 #7a5500, -2px 2px 0 #7a5500; letter-spacing: 0.05em; line-height: 1; margin-bottom: 2px; }
.subtitle { font-family: 'Permanent Marker', cursive; font-size: clamp(0.7rem, 1.8vw, 1rem); color: #ff6b35; letter-spacing: 0.12em; margin-bottom: 10px; }

/* JOIN button in header */
.join-btn-header { position: absolute; top: 24px; right: 24px; background: transparent; border: 2px solid #FFD700; color: #FFD700; font-family: 'Bangers', cursive; font-size: 1.1rem; padding: 8px 20px; cursor: pointer; border-radius: 4px; letter-spacing: 0.08em; transition: all 0.15s; }
.join-btn-header:hover { background: #FFD700; color: #1a0a00; }
.join-btn-header.joined { border-color: #4cff72; color: #4cff72; font-size: 0.85rem; padding: 6px 14px; }
.join-btn-header.joined:hover { background: #4cff72; color: #1a0a00; }

/* TOOLBAR */
.toolbar { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 9px 16px; background: rgba(0,0,0,0.55); border-top: 2px solid #FFD700; border-bottom: 2px solid #FFD700; flex-wrap: wrap; }
.tool-btn { background: #2a1500; border: 2px solid #FFD700; color: #FFD700; font-family: 'Bangers', cursive; font-size: 1rem; padding: 6px 14px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 6px; transition: all 0.12s; letter-spacing: 0.05em; }
.tool-btn:hover, .tool-btn.active { background: #FFD700; color: #1a0a00; }
.tool-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.size-slider { -webkit-appearance: none; width: 85px; height: 5px; border-radius: 3px; background: #FFD700; outline: none; cursor: pointer; }
.size-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%; background: #FFD700; border: 3px solid #1a0a00; cursor: pointer; }
.color-picker { width: 34px; height: 34px; border: 3px solid #FFD700; border-radius: 50%; cursor: pointer; background: none; padding: 0; overflow: hidden; }
.color-picker::-webkit-color-swatch-wrapper { padding: 0; }
.color-picker::-webkit-color-swatch { border: none; border-radius: 50%; }
.label { color: #FFD700; font-size: 0.9rem; letter-spacing: 0.04em; }
.clear-btn { border-color: #ff4444; color: #ff4444; background: #2a0000; }
.clear-btn:hover { background: #ff4444; color: white; }

/* BOARD */
.board-outer { display: flex; justify-content: center; align-items: flex-start; padding: 18px 24px 10px; background: #1a0a00; }
.board-container { position: relative; width: 100%; max-width: 1200px; height: calc(100vh - 310px); min-height: 400px; border-radius: 6px; overflow: hidden; }

/* Parchment */
.parchment-bg {
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(100,60,10,0.09) 27px, rgba(100,60,10,0.09) 28px),
    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(100,60,10,0.04) 27px, rgba(100,60,10,0.04) 28px),
    radial-gradient(ellipse at 10% 10%, #e8d08a 0%, transparent 50%),
    radial-gradient(ellipse at 90% 85%, #d4b86a 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, #f0d9a0 0%, #e0c070 100%);
  border: 14px solid transparent;
  border-image: linear-gradient(135deg, #8B5E1A, #c8941a, #7a4f10, #b8841a, #8B5E1A) 1;
  box-shadow:
    inset 0 0 60px rgba(0,0,0,0.18),
    inset 0 0 120px rgba(100,60,0,0.12),
    inset 6px 6px 20px rgba(139,94,26,0.2),
    inset -6px -6px 20px rgba(100,60,0,0.15),
    0 8px 40px rgba(0,0,0,0.7),
    0 2px 8px rgba(0,0,0,0.5);
}
/* Torn/aged corners */
.parchment-bg::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 0% 0%, rgba(139,94,26,0.35) 0%, transparent 25%),
    radial-gradient(ellipse at 100% 0%, rgba(100,60,0,0.3) 0%, transparent 22%),
    radial-gradient(ellipse at 0% 100%, rgba(100,60,0,0.3) 0%, transparent 22%),
    radial-gradient(ellipse at 100% 100%, rgba(139,94,26,0.35) 0%, transparent 25%);
  pointer-events: none;
}
/* Faint stains */
.parchment-bg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 40%, rgba(139,94,26,0.07) 0%, transparent 30%),
    radial-gradient(ellipse at 70% 65%, rgba(100,60,0,0.06) 0%, transparent 25%);
  pointer-events: none;
}

#drawCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; z-index: 2; }

/* LOGIN OVERLAY */
.login-overlay {
  position: absolute; inset: 0; z-index: 10;
  background: rgba(20,8,0,0.72);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(2px);
  border-radius: 6px;
}
.login-overlay.hidden { display: none; }
.login-box {
  background: #1a0a00;
  border: 3px solid #FFD700;
  border-radius: 8px;
  padding: 32px 36px;
  text-align: center;
  max-width: 360px;
  width: 90%;
  box-shadow: 0 0 60px rgba(255,215,0,0.15);
}
.login-box h2 { color: #FFD700; font-size: 2rem; margin-bottom: 4px; letter-spacing: 0.05em; }
.login-box p { font-family: 'Permanent Marker', cursive; color: #ff6b35; font-size: 0.8rem; margin-bottom: 22px; letter-spacing: 0.08em; }
.login-input {
  width: 100%; background: #2a1500; border: 2px solid #FFD700; color: #FFD700;
  font-family: 'Permanent Marker', cursive; font-size: 0.95rem;
  padding: 10px 14px; border-radius: 4px; margin-bottom: 12px; outline: none;
  letter-spacing: 0.04em;
}
.login-input::placeholder { color: rgba(255,215,0,0.35); }
.login-input:focus { border-color: #ff6b35; }
.login-submit {
  width: 100%; background: #FFD700; border: none; color: #1a0a00;
  font-family: 'Bangers', cursive; font-size: 1.3rem; padding: 11px;
  border-radius: 4px; cursor: pointer; letter-spacing: 0.08em; transition: all 0.12s;
  margin-top: 4px;
}
.login-submit:hover { background: #ff6b35; color: white; }
.login-error { color: #ff4444; font-family: 'Permanent Marker', cursive; font-size: 0.78rem; margin-top: 8px; display: none; }

/* MODAL OVERLAY (JOIN popup when already logged in) */
.modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.modal-overlay.hidden { display: none; }
.modal-box { background: #1a0a00; border: 3px solid #FFD700; border-radius: 8px; padding: 28px 32px; text-align: center; max-width: 340px; width: 90%; box-shadow: 0 0 60px rgba(255,215,0,0.15); }
.modal-box h2 { color: #FFD700; font-size: 1.8rem; margin-bottom: 16px; }
.modal-box .user-info { font-family: 'Permanent Marker', cursive; color: #ff6b35; font-size: 0.85rem; line-height: 1.8; margin-bottom: 18px; }
.modal-box .user-info span { color: #FFD700; }
.modal-close { background: transparent; border: 2px solid #FFD700; color: #FFD700; font-family: 'Bangers', cursive; font-size: 1.1rem; padding: 8px 24px; border-radius: 4px; cursor: pointer; letter-spacing: 0.05em; margin-right: 8px; }
.modal-close:hover { background: #FFD700; color: #1a0a00; }
.modal-logout { background: transparent; border: 2px solid #ff4444; color: #ff4444; font-family: 'Bangers', cursive; font-size: 1.1rem; padding: 8px 24px; border-radius: 4px; cursor: pointer; letter-spacing: 0.05em; }
.modal-logout:hover { background: #ff4444; color: white; }

/* STATUS */
.live-badge { position: fixed; bottom: 16px; right: 16px; background: rgba(0,0,0,0.88); border: 2px solid #FFD700; color: #FFD700; font-family: 'Bangers', cursive; font-size: 0.95rem; padding: 6px 13px; border-radius: 30px; display: flex; align-items: center; gap: 7px; z-index: 100; letter-spacing: 0.05em; }
.ws-status { position: fixed; bottom: 16px; left: 16px; background: rgba(0,0,0,0.88); border: 2px solid #555; color: #888; font-family: 'Bangers', cursive; font-size: 0.85rem; padding: 5px 13px; border-radius: 30px; z-index: 100; letter-spacing: 0.05em; transition: all 0.3s; }
.ws-status.connected { border-color: #4cff72; color: #4cff72; }
.ws-status.error { border-color: #ff4444; color: #ff4444; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: #4cff72; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.6); } }

.footer-note { text-align: center; font-family: 'Permanent Marker', cursive; color: rgba(255,215,0,0.3); font-size: 0.65rem; padding: 5px; letter-spacing: 0.1em; }

.cursor-custom { position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -100%); font-size: 24px; display: none; line-height: 1; }
.pen-mode #drawCanvas { cursor: none; }
.eraser-mode #drawCanvas { cursor: none; }
</style>
</head>
<body>

<div class="cursor-custom" id="cursorPen">✏️</div>
<div class="cursor-custom" id="cursorEraser">🧽</div>

<!-- MODAL: profile info popup -->
<div class="modal-overlay hidden" id="profileModal">
  <div class="modal-box">
    <h2>YOUR PROFILE</h2>
    <div class="user-info">
      Name: <span id="modalName">-</span><br>
      BTC: <span id="modalBtc" style="font-size:0.7rem;word-break:break-all;">-</span>
    </div>
    <button class="modal-close" onclick="closeModal()">CLOSE</button>
    <button class="modal-logout" onclick="logout()">LOGOUT</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <img src="logo.jpg" alt="Ho Lee Chit" class="logo-img" id="logo" onerror="this.style.display='none'">
  <div class="title">HO LEE CHIT</div>
  <div class="subtitle">$HooLeeChit on Bitcoin</div>
  <button class="join-btn-header" id="joinBtn" onclick="onJoinClick()">JOIN</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="tool-btn active" id="penBtn" onclick="setTool('pen')">✏️ PENCIL</button>
  <button class="tool-btn" id="eraserBtn" onclick="setTool('eraser')">🧽 SPONGE</button>
  <div style="display:flex;align-items:center;gap:6px;">
    <span class="label">SIZE</span>
    <input type="range" class="size-slider" id="sizeSlider" min="1" max="40" value="4">
    <span class="label" id="sizeLabel">4</span>
  </div>
  <div style="display:flex;align-items:center;gap:6px;">
    <span class="label">COLOR</span>
    <input type="color" class="color-picker" id="colorPicker" value="#1a0a00">
  </div>
  <button class="tool-btn clear-btn" onclick="clearBoard()">🗑️ CLEAR ALL</button>
</div>

<!-- BOARD -->
<div class="board-outer">
  <div class="board-container">
    <div class="parchment-bg"></div>
    <canvas id="drawCanvas"></canvas>
    <!-- Login overlay on top of board -->
    <div class="login-overlay" id="loginOverlay">
      <div class="login-box">
        <h2>JOIN THE BOARD</h2>
        <p>enter your details to draw, ser</p>
        <input class="login-input" id="inputName" type="text" placeholder="Your name / nickname" maxlength="32">
        <input class="login-input" id="inputBtc" type="text" placeholder="Bitcoin address (bc1...)" maxlength="90">
        <button class="login-submit" onclick="submitJoin()">LET ME DRAW 🖊️</button>
        <div class="login-error" id="loginError">Please enter at least your name!</div>
      </div>
    </div>
  </div>
</div>

<div class="footer-note">✦ draw something, ser ✦ everyone sees it live ✦</div>
<div class="live-badge"><div class="live-dot"></div><span id="onlineCount">1</span> online</div>
<div class="ws-status" id="wsStatus">connecting...</div>

<script>
// ════════════════════════════════════════════════════════
// Inlocuieste cu URL-ul tau de pe Render.com
// ════════════════════════════════════════════════════════
const WS_URL = 'wss://REPLACE-WITH-YOUR-RENDER-URL.onrender.com';

// ── User session (saved in localStorage) ─────────────────
let currentUser = null;

function loadUser() {
  try {
    const saved = localStorage.getItem('hlc_user');
    if (saved) currentUser = JSON.parse(saved);
  } catch(e) { currentUser = null; }
}

function saveUser(name, btc) {
  currentUser = { name, btc };
  localStorage.setItem('hlc_user', JSON.stringify(currentUser));
}

function logout() {
  localStorage.removeItem('hlc_user');
  currentUser = null;
  closeModal();
  updateUI();
}

function updateUI() {
  const joinBtn = document.getElementById('joinBtn');
  const overlay = document.getElementById('loginOverlay');
  if (currentUser) {
    joinBtn.textContent = '👤 ' + currentUser.name;
    joinBtn.classList.add('joined');
    overlay.classList.add('hidden');
  } else {
    joinBtn.textContent = 'JOIN';
    joinBtn.classList.remove('joined');
    overlay.classList.remove('hidden');
  }
}

function onJoinClick() {
  if (currentUser) {
    // Show profile modal
    document.getElementById('modalName').textContent = currentUser.name;
    document.getElementById('modalBtc').textContent = currentUser.btc || 'not provided';
    document.getElementById('profileModal').classList.remove('hidden');
  }
  // If not logged in, the overlay is already visible on the board
}

function closeModal() {
  document.getElementById('profileModal').classList.add('hidden');
}

function submitJoin() {
  const name = document.getElementById('inputName').value.trim();
  const btc = document.getElementById('inputBtc').value.trim();
  const err = document.getElementById('loginError');
  if (!name) { err.style.display = 'block'; return; }
  err.style.display = 'none';
  saveUser(name, btc);
  updateUI();
}

// Close modal on overlay click
document.getElementById('profileModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Canvas ────────────────────────────────────────────────
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const c = canvas.parentElement;
  canvas.width = c.clientWidth;
  canvas.height = c.clientHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); replayStrokes(); });
resizeCanvas();

let tool = 'pen', drawing = false, lastX = 0, lastY = 0;
let color = '#1a0a00', size = 4;
let allStrokes = [], currentPoints = [];
let ws = null;

// ── WebSocket ─────────────────────────────────────────────
function connect() {
  const status = document.getElementById('wsStatus');
  status.textContent = 'connecting...'; status.className = 'ws-status';
  try { ws = new WebSocket(WS_URL); } catch(e) { status.textContent = '⚠ offline'; status.className = 'ws-status error'; return; }
  ws.onopen = () => { status.textContent = '● live'; status.className = 'ws-status connected'; };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'init') { allStrokes = msg.strokes || []; replayStrokes(); }
    if (msg.type === 'stroke') { allStrokes.push(msg.stroke); drawStroke(msg.stroke); }
    if (msg.type === 'clear') { allStrokes = []; ctx.clearRect(0,0,canvas.width,canvas.height); }
    if (msg.type === 'presence') { document.getElementById('onlineCount').textContent = msg.count; }
  };
  ws.onclose = () => { status.textContent = '⚠ reconnecting...'; status.className = 'ws-status error'; setTimeout(connect, 3000); };
  ws.onerror = () => { status.textContent = '⚠ offline'; status.className = 'ws-status error'; };
}
connect();

function drawStroke(s) {
  if (!s.points || s.points.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(s.points[0].x * canvas.width, s.points[0].y * canvas.height);
  for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i].x * canvas.width, s.points[i].y * canvas.height);
  ctx.strokeStyle = s.color; ctx.lineWidth = s.size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.globalCompositeOperation = s.eraser ? 'destination-out' : 'source-over';
  ctx.stroke(); ctx.globalCompositeOperation = 'source-over';
}
function replayStrokes() { ctx.clearRect(0,0,canvas.width,canvas.height); allStrokes.forEach(drawStroke); }

// ── Tool ──────────────────────────────────────────────────
const cursorPen = document.getElementById('cursorPen');
const cursorEraser = document.getElementById('cursorEraser');
document.addEventListener('mousemove', (e) => {
  cursorPen.style.left = e.clientX+'px'; cursorPen.style.top = e.clientY+'px';
  cursorEraser.style.left = e.clientX+'px'; cursorEraser.style.top = e.clientY+'px';
});

function setTool(t) {
  tool = t;
  document.getElementById('penBtn').classList.toggle('active', t==='pen');
  document.getElementById('eraserBtn').classList.toggle('active', t==='eraser');
  document.body.classList.toggle('pen-mode', t==='pen');
  document.body.classList.toggle('eraser-mode', t==='eraser');
  cursorPen.style.display = t==='pen' ? 'block' : 'none';
  cursorEraser.style.display = t==='eraser' ? 'block' : 'none';
}
setTool('pen');

document.getElementById('sizeSlider').addEventListener('input', (e) => { size=parseInt(e.target.value); document.getElementById('sizeLabel').textContent=size; });
document.getElementById('colorPicker').addEventListener('input', (e) => { color=e.target.value; });

// ── Drawing ───────────────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX-rect.left)/rect.width, y: (src.clientY-rect.top)/rect.height };
}
function drawLive(x1,y1,x2,y2) {
  ctx.beginPath(); ctx.moveTo(x1*canvas.width, y1*canvas.height); ctx.lineTo(x2*canvas.width, y2*canvas.height);
  ctx.strokeStyle = tool==='eraser' ? 'rgba(0,0,0,1)' : color;
  ctx.lineWidth = tool==='eraser' ? size*4 : size;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.globalCompositeOperation = tool==='eraser' ? 'destination-out' : 'source-over';
  ctx.stroke(); ctx.globalCompositeOperation='source-over';
}

function canDraw() { return !!currentUser; }

canvas.addEventListener('mousedown', (e) => { if(!canDraw()) return; drawing=true; const p=getPos(e); lastX=p.x; lastY=p.y; currentPoints=[p]; });
canvas.addEventListener('mousemove', (e) => { if(!drawing||!canDraw()) return; const p=getPos(e); drawLive(lastX,lastY,p.x,p.y); currentPoints.push(p); lastX=p.x; lastY=p.y; });
function endDraw() {
  if(!drawing) return; drawing=false;
  if(currentPoints.length<2) return;
  const stroke = { color: tool==='eraser'?'#fff':color, size: tool==='eraser'?size*4:size, eraser: tool==='eraser', points: currentPoints };
  allStrokes.push(stroke);
  if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'stroke',stroke}));
  currentPoints=[];
}
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', (e) => { if(!canDraw()) return; e.preventDefault(); const p=getPos(e); drawing=true; lastX=p.x; lastY=p.y; currentPoints=[p]; }, {passive:false});
canvas.addEventListener('touchmove', (e) => { if(!drawing||!canDraw()) return; e.preventDefault(); const p=getPos(e); drawLive(lastX,lastY,p.x,p.y); currentPoints.push(p); lastX=p.x; lastY=p.y; }, {passive:false});
canvas.addEventListener('touchend', endDraw);

function clearBoard() {
  if(!confirm('Ho Lee Chit! Clear the entire board for everyone?')) return;
  allStrokes=[]; ctx.clearRect(0,0,canvas.width,canvas.height);
  if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'clear'}));
}

// ── Init ──────────────────────────────────────────────────
loadUser();
updateUI();
</script>
</body>
</html>
